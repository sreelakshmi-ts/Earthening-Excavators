{% extends 'Shops/Head.html'%}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancelled Operator Request</title>
</head>
<body>
    <table border="1" align="center">
        <tr>
            <th>Sl.No</th>
            <th>user Name</th>
            <th>Contact</th>
            <th>Email</th>
            <th>Date</th>
            <th>Request</th>
            
        </tr>
        {% for i in req %}
        <tr>
            <td>{{forloop.counter}}</td>
            <td>{{i.user.name}}</td>
            <td>{{i.user.contact}}</td>
            <td>{{i.user.email}}</td>
            <td>{{i.request_date}}</td>
            <td>{{i.request}}</td>
            
            {% endfor %}
        </tr>
        </table>
        </body>
        </html>
        {% endblock content %}
