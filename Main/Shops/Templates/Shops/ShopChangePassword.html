{% extends 'Shops/Head.html'%}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Change Password</title>
</head>
<body>
    <form method="post">
      {% csrf_token %}
        <table  border="1" cellpadding="10">
          <tr>
            <td>Old Password</td>
            <td><input type="password" name="txt_oldpass" id="txtoldpass"</td>
          </tr> 
          <tr>
            <td>New Password</td>
            <td><input type="password" name="txt_newpass" id="txtnewpass"></td>
          </tr>
          <tr>
            <td>Confirm Password</td>
            <td><input type="password" name="txt_conpass" id="txtconpass"></td>
          </tr>
          <tr>
            <td colspan="2"><input type="submit" name="btn_submit" id="btnsubmit" value="Submit">
            <input type="submit" name="btn_cancel" id="btncancel" value="Cancel"></td>
            
          </tr>
          {{ER}}
        </table>
    </form>
    </body>
    </html>
    {% endblock content %}
