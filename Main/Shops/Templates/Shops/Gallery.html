{% extends 'Shops/Head.html'%}
{% load static %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Gallery</title>
</head>
<body>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
    <table border="1" align="center">
        <tr>
            <td>Photos</td>
            <td><input type="file" name="file_photo" id="filephoto" required="required"></td>
        </tr>
        <tr>
            <td><input type="submit" name="btn_upload" id="btnupload" value="Upload">
                <input type="submit" name="btn_cancel" id="btncancel" value="Cancel">
            </td>
        </tr>
        </table>
        <br>
        <br>
        <br><br>
        <table border="1" align="center">
            <tr>
                <th>SI.No</th>
                <th>Image</th>
                <th>Action</th>
            </tr>
            {% for i in gal %}
            <tr>
                <td>{{forloop.counter}}</td>
                <td><img src="{{i.image.url}}" width="150" height="150"></td>
                <td><a href="{% url 'webshop:delimg' i.id %}">Remove</a></td>
            </tr>
            {% endfor %}
        


        </table>
        </form>
        </body>
        </html>
    {% endblock content %}
