{% extends 'Users/Head.html'%}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Edit Profile</title>
</head>
<body>
    <form method="post">
      {% csrf_token %}
        <table  border="1" cellpadding="10" align="center">
          <tr>
            <td>Name</td>
            <td><input type="text" name="txt_name" id="txtname" value="{{data.name}}"></td>
          </tr> 
          <tr>
            <td>Contact</td>
            <td><input type="text" name="txt_contact" id="txtcontact" value="{{data.contact}}"></td>
          </tr>
          <tr>
            <td>Address</td>
            <td><input type="text" name="txt_address" id="txtaddress" value="{{data.address}}"></td>
          </tr>
          <tr>
            <td>Email</td>
            <td><input type="text" name="txt_email" id="txtemail" value="{{data.email}}"></td>
          </tr>
          <tr>
            <td colspan="2"><input type="submit" name="btn_submit" id="btnsubmit" value="Submit">
            <input type="submit" name="btn_cancel" id="btncancel" value="Cancel"></td>
            
          </tr>
        </table>
    </form>
    </body>
    </html>
    {% endblock content %}
