{% extends 'Admin/Head.html'%}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subcategory</title>
</head>
<body>
    <form method="post">
        {% csrf_token %}
        <table border="1" cellpadding="10">
            <tr>
                <td>Category</td>
                <td><select name="ddlcategory" id="ddlcategory">
                    <option value="">---Select---</option>
                    {% for i in cat %}
                    <option value="{{i.id}}">{{i}}</option>
                    {% endfor %}
                    </select>
                </td>
            </tr>
            <tr>
                <td>Subcategory</td>
                <td><input type="text" name="txt_subcategory" id=txtsubcategory value="{{res}}" required="required" pattern="[A-Z a-z]"></td>
                
            </tr>
            <tr>
                <td><input type="submit" name="btn_submit" id="btnsubmit" value="Submit">
                <input type="submit" name="btn_cancel" id="btncancel" value="Cancel"></td>
            </tr>
        </table>
        <table border="1" align="center">
            <tr>
                <th>Sl.No</th>
                <th>Category</th>
                <th>Subcategory</th>
                <th>Action</th>
            </tr>
            {% for i in subcat %}
            <tr>
                <td>{{forloop.counter}}</td>
                <td>{{i.category}}</td>
                <td>{{i}}</td>
                <td><a href="{% url 'webadmin:delsubcategory' i.id %}">Delete</a>/<a href="{% url 'webadmin:edicategory' i.id %}">Edit</a></a></td>
            </tr>
            {% endfor %}
            </table>
    </form>
    </body>
    </html>
    {% endblock content %}
